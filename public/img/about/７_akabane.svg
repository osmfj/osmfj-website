<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img">
  <title>赤羽 Akabane</title>
  <desc>旧岩淵水門（赤水門）をモチーフにした赤羽のアイコン</desc>

  <circle cx="100" cy="100" r="100" fill="#C0392B"/>

  <!-- water shimmer -->
  <rect x="10" y="118" width="180" height="10" rx="2" fill="white" opacity="0.18"/>

  <!-- pier left -->
  <rect x="34" y="52" width="18" height="82" rx="3" fill="white"/>
  <!-- pier right -->
  <rect x="148" y="52" width="18" height="82" rx="3" fill="white"/>

  <!-- arch -->
  <path d="M34 88 Q60 30 166 88" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- crossbeam -->
  <rect x="26" y="86" width="148" height="10" rx="3" fill="white"/>

  <!-- gate panel left -->
  <rect x="34" y="96" width="52" height="36" rx="2" fill="white"/>
  <rect x="34" y="104" width="52" height="4" rx="1" fill="#C0392B"/>
  <rect x="34" y="114" width="52" height="4" rx="1" fill="#C0392B"/>
  <rect x="34" y="124" width="52" height="4" rx="1" fill="#C0392B"/>

  <!-- gate panel right -->
  <rect x="114" y="96" width="52" height="36" rx="2" fill="white"/>
  <rect x="114" y="104" width="52" height="4" rx="1" fill="#C0392B"/>
  <rect x="114" y="114" width="52" height="4" rx="1" fill="#C0392B"/>
  <rect x="114" y="124" width="52" height="4" rx="1" fill="#C0392B"/>

  <!-- top knobs -->
  <circle cx="43" cy="50" r="6" fill="white"/>
  <circle cx="157" cy="50" r="6" fill="white"/>

  <!-- label -->
  <text x="100" y="158" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="white">赤羽</text>
  <text x="100" y="173" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" opacity="0.85">Akabane</text>
</svg>
